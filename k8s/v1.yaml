apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmacy-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pharmacy-v1
  template:
    metadata:
      labels:
        app: pharmacy-v1
    spec:
      containers:
      - name: pharmacy-v1
        image: pharmacy:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8080   # ✅ Spring Boot default

---
apiVersion: v1
kind: Service
metadata:
  name: pharmacy-v1-service
spec:
  type: NodePort
  selector:
    app: pharmacy-v1
  ports:
    - port: 8080        # service port
      targetPort: 8080  # container port
      nodePort: 30001   # external access
