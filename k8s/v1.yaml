apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmacy-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pharmacy-v1
  template:
    metadata:
      labels:
        app: pharmacy-v1
    spec:
      containers:
      - name: pharmacy-v1
        image: pharmacy:v1
        imagePullPolicy: Never   # 🔥 IMPORTANT (use local image)
        ports:
        - containerPort: 8081

---
apiVersion: v1
kind: Service
metadata:
  name: pharmacy-v1-service
spec:
  type: NodePort
  selector:
    app: pharmacy-v1
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30001
