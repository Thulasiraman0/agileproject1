apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmacy-v3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pharmacy-v3
  template:
    metadata:
      labels:
        app: pharmacy-v3
    spec:
      containers:
      - name: pharmacy-v3
        image: yourdockerhub/pharmacy:v3
        ports:
        - containerPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: pharmacy-v3-service
spec:
  type: NodePort
  selector:
    app: pharmacy-v3
  ports:
    - port: 8083
      targetPort: 8083
      nodePort: 30003